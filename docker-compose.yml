services:
  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://flip:flip@db:5432/flip_or_rip
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: flip
      POSTGRES_PASSWORD: flip
      POSTGRES_DB: flip_or_rip
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flip -d flip_or_rip"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
